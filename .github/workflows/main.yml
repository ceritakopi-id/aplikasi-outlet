name: Build Windows EXE

on:
  workflow_dispatch: # Membuat tombol klik manual untuk merakit aplikasi

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Cek kode sumber
      uses: actions/checkout@v4

    - name: Siapkan Python Resmi Windows
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instal Peralatan Pendukung
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller streamlit requests pandas openpyxl altair

    - name: Rakit Menjadi File EXE Mandiri
      run: |
        pyinstaller --onefile --hidden-import=altair.vegalite.v5 app_outlet.py

    - name: Amankan Hasil File EXE
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi_Outlet_Windows
        path: dist/app_outlet.exe
