name: Build Windows EXE

on:
  workflow_dispatch: # Membuat tombol klik manual untuk merakit aplikasi

jobs:
  build:
    runs-on: windows-latest # Menggunakan server Windows asli, bebas error!

    steps:
    - name: Cek kode sumber
      uses: actions/checkout@v4 # Diperbarui ke v4 (Mendukung Node 24)

    - name: Siapkan Python Resmi Windows
      uses: actions/setup-python@v5 # Diperbarui ke v5 (Mendukung Node 24)
      with:
        python-version: '3.10'

    - name: Instal Peralatan Pendukung
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller streamlit requests pandas openpyxl

    - name: Rakit Menjadi File EXE Mandiri
      run: |
        pyinstaller --onefile app_outlet.py

    - name: Amankan Hasil File EXE
      uses: actions/upload-artifact@v4 # Tetap v4 (Sudah versi terbaru & aman)
      with:
        name: Aplikasi_Outlet_Windows
        path: dist/app_outlet.exe
